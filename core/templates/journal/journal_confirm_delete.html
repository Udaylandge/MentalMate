{% extends "base.html" %}
{% block title %}Delete Journal Entry - MentalMate{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-5">
    <div class="card text-center p-3">
      <div class="card-body">
        <div style="font-size: 2.5rem; margin-bottom: 1rem;">🗑️</div>
        <h4>Delete Journal Entry?</h4>
        <p class="text-muted mb-4">
          Written on <strong>{{ entry.created_at|date:"N j, Y" }}</strong>.<br>
          This action cannot be undone.
        </p>
        <blockquote class="text-muted text-start" style="font-size: 0.9rem; border-left: 3px solid var(--mm-border); padding-left: 1rem; margin-bottom: 1.5rem;">
          {{ entry.text|truncatechars:120 }}
        </blockquote>
        <form method="post" class="d-flex gap-2 justify-content-center">
          {% csrf_token %}
          <a class="btn btn-outline-secondary" href="{% url 'journal-list' %}">Cancel</a>
          <button class="btn btn-danger" type="submit">
            <i class="bi bi-trash me-1"></i>Delete
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
