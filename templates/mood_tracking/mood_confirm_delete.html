{% extends "base.html" %}
{% block title %}Delete Mood Entry - MentalMate{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-5">
    <div class="card text-center p-3">
      <div class="card-body">
        <div style="font-size: 2.5rem; margin-bottom: 1rem;">🗑️</div>
        <h4>Delete Mood Entry?</h4>
        <p class="text-muted mb-4">
          Entry for <strong>{{ entry.entry_date }}</strong> — Mood score: <strong>{{ entry.mood_score }}/10</strong>
          <br>This action cannot be undone.
        </p>
        <form method="post" class="d-flex gap-2 justify-content-center">
          {% csrf_token %}
          <a class="btn btn-outline-secondary" href="{% url 'mood-list' %}">Cancel</a>
          <button class="btn btn-danger" type="submit">
            <i class="bi bi-trash me-1"></i>Delete
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
