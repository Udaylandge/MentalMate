{% extends "base.html" %}
{% block title %}Offline - MentalMate{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-5 text-center mt-5">
    <div style="font-size: 4rem; margin-bottom: 1rem;">🔌</div>
    <h2 class="mb-3">You are offline</h2>
    <p class="text-muted mb-4">
      MentalMate requires an internet connection to log moods or sync data. Please check your connection and try again.
    </p>
    <button onclick="window.location.reload()" class="btn btn-primary px-4 py-2">
      <i class="bi bi-arrow-clockwise me-2"></i>Retry Connection
    </button>
  </div>
</div>
{% endblock %}
